name: Daily Dinner Reminder

on:
  schedule:
    # 7am ET every day. UTC cron so we need both for DST.
    - cron: "0 11 * * *"   # 7am EDT
    - cron: "0 12 * * *"   # 7am EST
  workflow_dispatch: {}

concurrency:
  group: daily-reminder
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: DST double-fire guard
        id: dst_guard
        run: |
          # Pick the cron that matches current DST in America/New_York and skip the other.
          # Keying off github.event.schedule (not wall-clock time) makes this robust to
          # GitHub Actions cron jitter, which routinely delays runs by 30-90 minutes.
          # workflow_dispatch always runs.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual trigger, running"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OFFSET=$(TZ=America/New_York date +%z)   # "-0400" in EDT, "-0500" in EST
          TRIGGERED="${{ github.event.schedule }}"
          if [ "$OFFSET" = "-0400" ]; then
            EXPECTED="0 11 * * *"
          else
            EXPECTED="0 12 * * *"
          fi
          echo "ET offset: $OFFSET / triggered: '$TRIGGERED' / expected: '$EXPECTED'"
          if [ "$TRIGGERED" = "$EXPECTED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Wrong cron for current DST, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.dst_guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script dependencies
        if: steps.dst_guard.outputs.skip != 'true'
        run: pip install pyyaml requests

      - name: Send reminder
        if: steps.dst_guard.outputs.skip != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/send_daily_reminder.py
